<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Postres | Martti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Trirong:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../css/styles.css">
</head>
<body>
  <header class="header">
    <nav class="navbar">
      <div class="nav-left">
        <ul class="nav-links">
          <li><a href="../../../index.html">Inicio</a></li>
          <li><a href="../../nosotros.html">Nosotros</a></li>
          <li><a href="../../productos.html">Productos</a></li>
          <li><a href="../../contacto.html">Contacto</a></li>
        </ul>
      </div>
      <div class="nav-actions">
        <div class="search-pill">
          <input type="search" class="search-input" placeholder="Buscar..." aria-label="Buscar">
          <button class="search-button" aria-label="Buscar">
            <svg class="icon-search" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7" />
              <line x1="16.5" y1="16.5" x2="21" y2="21" />
            </svg>
          </button>
        </div>
        <button class="cart-button" aria-label="Carrito">
          <svg class="cart-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.6 13h10.4l2-8H6"></path>
          </svg>
          <span class="cart-count">0</span>
        </button>
      </div>
    </nav>
    <div class="logo-float">
      <img src="../../../assets/logos/logo-martti.png" alt="Logo Martti">
    </div>
  </header>

  <main>
    <section class="products-grid-title">
      <article class="product-card-title">
        <img src="../../../assets/product/postres/rogel/rogel.jpg" alt="Postres">
        <h1>Postres</h1>
      </article>
    </section>

    <section id="postres" class="product">
      <div class="product-grid">
    
        <a href="../postres/blondie-fr.html" class="product-link">
          <article class="product-card" data-name="blondie-frutos-rojos">
            <div class="product-label">Blondie Frutos Rojos</div>
            <img src="../../../assets/product/postres/blondie/blondies.png" alt="Blondie Frutos Rojos">
          </article>
        </a>
        <a href="../postres/marquise.html" class="product-link">
          <article class="product-card" data-name="marquise">
            <div class="product-label">Marquise</div>
            <img src="../../../assets/product/postres/marquise/marquise-rosca-zoom.jpg" alt="Marquise">
          </article>
        </a>
        <a href="../postres/nube-de-nuez.html" class="product-link">
          <article class="product-card" data-name="nube-de-nuez">
            <div class="product-label">Nube de Nuez</div>
            <img src="../../../assets/product/postres/nube-nuez/nube-de-nuez.png" alt="Nube de Nuez">
          </article>
        </a>
        <a href="../postres/pavlova.html" class="product-link">
          <article class="product-card" data-name="pavlova">
            <div class="product-label">Pavlova</div>
            <img src="../../../assets/product/postres/pavlova/pavlova-redonda-zoom.jpg" alt="Pavlova">
          </article>
        </a>
        <a href="../postres/rogel.html" class="product-link">
          <article class="product-card" data-name="rogel">
            <div class="product-label">Rogel</div>
            <img src="../../../assets/product/postres/rogel/rogel-zoom.jpg" alt="Rogel">
          </article>
        </a>
        <a href="../postres/tiramisu.html" class="product-link">
          <article class="product-card" data-name="tiramisu">
            <div class="product-label">Tiramisu</div>
            <img src="../../../assets/product/postres/tiramisu/tiramisu-zoom.jpg" alt="Tiramisu">
          </article>
        </a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <section class="footer-content">
      <div class="footer-block">
        <h3>Contacto</h3>
        <address>
          <p>Mail:</p>
          <p>Telefono:</p>
        </address>
      </div>
      <div class="footer-block">
        <h3>Ubicacion</h3>
        <div class="mapa-container">
          <iframe src="https://www.google.com/maps?q=San+Antonio+3892,+Manantiales,+Cordoba,+Argentina&output=embed"
            class="mapa-ubicacion" style="border:0;" allowfullscreen loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
      </div>
      <div class="footer-block redes">
        <h3>Seguinos en</h3>
        <a href="https://www.instagram.com/martti.pasteleria/" target="_blank" rel="noopener">
          <img src="../../../assets/iconos/instagram.svg.png" alt="Instagram de Pasteleria Martti" class="icono-redes">
        </a>
      </div>
    </section>
  </footer>

  <script src="../../../js/main.js"></script>
  <script src="../../../js/search.js"></script>
  <script src="../../../js/cart.js"></script>
</body>
</html>
